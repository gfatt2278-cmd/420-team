<!DOCTYPE html>
<html lang="my">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ My Love ❤️</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- Background Stars -->
<div id="shooting-stars"></div>



<!-- Main Heart Button -->
<div id="heart">

❤️

</div>




<!-- Main Love Content -->

<section id="message">


<img 
src="love.jpg"
class="photo"
alt="Love Photo"
loading="lazy"
>



<h1>
💖 For You 💖
</h1>



<p id="messageText"></p>



<div id="timer"></div>



</section>






<!-- Letter Popup -->

<div id="letter-box">


<div id="envelope">

💌

</div>



<div id="letter">


<h2>
❤️ My Love ❤️
</h2>



<p>

မင်းနဲ့တွေ့ရတာ<br>

ကျွန်တော့်ဘဝရဲ့<br>

အပျော်ဆုံးအချိန်ပါ။


<br><br>


❤️ I Love You Forever ❤️


</p>


</div>


</div>






<!-- Photo Gallery -->

<div id="heart-gallery">


<img 
src="love1.jpg"
class="gallery"
loading="lazy"
>


<img 
src="love2.jpg"
class="gallery"
loading="lazy"
>


<img 
src="love3.jpg"
class="gallery"
loading="lazy"
>



</div>






<!-- Music -->

<audio 
id="music"
loop
preload="auto"
>

<source src="music.mp3" type="audio/mpeg">

</audio>






<script src="script.js"></script>



</body>

</html>
