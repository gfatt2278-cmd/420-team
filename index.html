<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ My Love ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Shooting Stars -->
    <div id="shooting-stars"></div>

    <!-- Floating Heart -->
    <div id="heart">❤️</div>

    <!-- Love Message -->
    <div id="message">

        <img src="love.jpg" class="photo" alt="Love">

        <h1>💖 For You 💖</h1>

        <p id="messageText"></p>

        <!-- Love Timer -->
        <div id="timer"></div>

        <!-- Letter -->
        <div id="letter-box">

            <div id="envelope">💌</div>

            <div id="letter">

                <h2>❤️ My Love ❤️</h2>

                <p>
                    မင်းနဲ့တွေ့ရတာ
                    ကျွန်တော့်ဘဝရဲ့
                    အပျော်ဆုံးအချိန်ပါ။
                    <br><br>
                    ❤️ I Love You Forever ❤️
                </p>

            </div>

        </div>

    </div>

    <!-- Gallery -->
    <div id="heart-gallery">

        <img src="love1.jpg" class="gallery" alt="">
        <img src="love2.jpg" class="gallery" alt="">
        <img src="love3.jpg" class="gallery" alt="">

    </div>

    <!-- Music -->
    <audio id="music" src="music.mp3" loop></audio>

    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
